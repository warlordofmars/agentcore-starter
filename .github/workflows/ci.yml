name: CI / Deploy

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Minimal default permissions — jobs that need more declare their own.
permissions:
  contents: read

# ── CI jobs (run on every push and PR) ────────────────────────────────────────

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src/starter

      - name: Copyright headers
        run: uv run python scripts/check_copyright.py


  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Install Node dependencies
        working-directory: ui
        run: npm install

      - name: pip-audit
        # CVE-2026-3219 affects pip 26.0.1 itself (no fix available yet)
        run: uv run pip-audit --skip-editable --ignore-vuln CVE-2026-3219

      - name: npm audit
        working-directory: ui
        run: npm audit --audit-level=high

      - name: Trivy — dependency scan (table, for log visibility)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
          scanners: vuln
          trivyignores: .trivyignore

      - name: Trivy — dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-deps.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          trivyignores: .trivyignore
          limit-severities-for-sarif: "true"

      - name: Upload Trivy dependency results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@f94817b9f0deeb3871261446912ae8f854d1b675 # codeql-bundle-v2.25.1
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps

      - name: Gitleaks — secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit -v --cov=src/starter --cov-report=xml:coverage-unit.xml

      - name: Write coverage summary
        if: always()
        run: |
          echo "## Unit Test Coverage" >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-unit
          path: coverage-unit.xml

  integration-tests:
    name: Integration Tests (DynamoDB Local)
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run combined unit + integration tests with coverage
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
          STARTER_JWT_SECRET: test-secret
          STARTER_TABLE_NAME: starter-integration
        run: uv run pytest tests/unit tests/integration -v --cov=src/starter --cov-report=xml:coverage-combined.xml --cov-fail-under=100

      - name: Write coverage summary
        if: always()
        run: |
          echo "## Combined Test Coverage" >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload combined coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-combined
          path: coverage-combined.xml

  coverage:
    name: Coverage Report
    needs: [unit-tests, integration-tests, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0  # SonarCloud needs full history for blame/new-code detection

      - name: Download unit coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-unit

      - name: Download combined coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-combined

      - name: Download JS coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-js

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');

            // Parse Python unit coverage XML
            const xml = fs.readFileSync('coverage-unit.xml', 'utf8');
            const lineRate = parseFloat(xml.match(/line-rate="([^"]+)"/)?.[1] ?? '0');
            const pct = (lineRate * 100).toFixed(1);
            const emoji = lineRate >= 0.9 ? '🟢' : lineRate >= 0.8 ? '🟡' : '🔴';

            // Build Python module rows from XML
            const rows = [];
            const classMatches = [...xml.matchAll(/<class[^>]*filename="([^"]*)"[^>]*line-rate="([^"]*)"[^>]*>/g)];
            for (const m of classMatches) {
              const name = m[1].replace('src/', '');
              const rate = (parseFloat(m[2]) * 100).toFixed(0);
              const bar = rate >= 90 ? '🟢' : rate >= 80 ? '🟡' : '🔴';
              rows.push(`| \`${name}\` | ${rate}% | ${bar} |`);
            }

            // Parse JS lcov coverage — sum lines found/hit across all files
            let jsLines = 0, jsHit = 0;
            const jsRows = [];
            try {
              const lcov = fs.readFileSync('lcov.info', 'utf8');
              let curFile = null, curFound = 0, curHit = 0;
              for (const line of lcov.split('\n')) {
                if (line.startsWith('SF:')) {
                  curFile = line.slice(3).replace(/^.*\/src\//, 'src/');
                  curFound = 0; curHit = 0;
                } else if (line.startsWith('LF:')) {
                  curFound = parseInt(line.slice(3), 10);
                  jsLines += curFound;
                } else if (line.startsWith('LH:')) {
                  curHit = parseInt(line.slice(3), 10);
                  jsHit += curHit;
                } else if (line === 'end_of_record' && curFile) {
                  const r = curFound > 0 ? (curHit / curFound * 100).toFixed(0) : '100';
                  const b = parseInt(r) >= 90 ? '🟢' : parseInt(r) >= 80 ? '🟡' : '🔴';
                  jsRows.push(`| \`${curFile}\` | ${r}% | ${b} |`);
                  curFile = null;
                }
              }
            } catch (_) { /* lcov not available */ }

            const jsPct = jsLines > 0 ? (jsHit / jsLines * 100).toFixed(1) : null;
            const jsEmoji = jsPct !== null ? (parseFloat(jsPct) >= 90 ? '🟢' : '🟡') : '⚪';

            const body = [
              `<!-- coverage-report -->`,
              `## Coverage Report`,
              ``,
              `### ${emoji} Python — ${pct}%`,
              ``,
              `| File | Cover | |`,
              `|:---|---:|:---|`,
              ...rows,
              ``,
              ...(jsPct !== null ? [
                `### ${jsEmoji} JavaScript — ${jsPct}%`,
                ``,
                `| File | Cover | |`,
                `|:---|---:|:---|`,
                ...jsRows,
                ``,
              ] : []),
              `> [full run](${context.payload.pull_request.html_url}/checks)`,
            ].join('\n');

            // Find existing comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- coverage-report -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Detect whether SonarCloud is configured for this fork.
      # A fresh fork won't have SONAR_TOKEN set yet — the SonarCloud project
      # must be created and the token generated through the SonarCloud UI
      # before the scan can run. Without this gate the scanner fails the
      # whole Coverage Report job, which cascades to Deploy / E2E / Release.
      # See #54 for the bootstrap-pattern context and the onboarding doc
      # update that walks through the SonarCloud setup steps.
      #
      # When SONAR_TOKEN is unset, this step emits a `::warning::`
      # annotation (visible in the GitHub Actions run summary, not just
      # the step logs) so that an accidental secret deletion in a repo
      # that previously had SonarCloud configured is loudly surfaced
      # rather than silently fail-open. The skip is the right behaviour
      # for fresh forks (which is why the job doesn't fail), but the
      # warning ensures the operator notices on every PR until the
      # secret is restored.
      #
      # Emits `configured=true` only when the secret is non-empty AND the
      # PR isn't from Dependabot (Dependabot PRs run with a restricted
      # GITHUB_TOKEN and have no access to repo secrets — see #120).
      - name: Check SonarCloud configured
        id: sonar_configured
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Order matters: check Dependabot first. Dependabot PRs run
          # with no access to repo secrets, so SONAR_TOKEN is also empty
          # there — if the empty-token branch ran first it would emit a
          # misleading "secret may have been accidentally deleted"
          # warning on every Dependabot PR. The Dependabot path is the
          # expected/known case; the empty-token-on-non-Dependabot path
          # is the surfaced one.
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "Dependabot PR — skipping SonarCloud steps (no secret access, see #120)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          elif [ -z "${SONAR_TOKEN:-}" ]; then
            echo "::warning title=SonarCloud skipped::SONAR_TOKEN is not set — SonarCloud scan skipped. Fresh fork? See .claude/agents/onboarding.md Phase 4.5. Canonical repo? The secret may have been accidentally deleted (issue #54)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "SonarCloud is configured — scan will run."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud Scan
        if: steps.sonar_configured.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # SonarCloud free plan only supports one main branch (development).
          # Quality gate status API returns 'not found' for main, so skip the
          # wait on main-branch pushes; keep it enforced on development + PRs.
          args: ${{ github.ref == 'refs/heads/main' && '-Dsonar.qualitygate.wait=false' || '' }}

      - name: Fetch SonarCloud issues as SARIF
        if: always() && steps.sonar_configured.outputs.configured == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/issues/search?projectKeys=warlordofmars_agentcore-starter&resolved=false&types=VULNERABILITY,SECURITY_HOTSPOT&ps=500" \
            -o sonar-issues.json
          python3 scripts/sonar_to_sarif.py sonar-issues.json sonar.sarif

      - name: Upload SonarCloud results to GitHub Security
        if: always() && steps.sonar_configured.outputs.configured == 'true'
        uses: github/codeql-action/upload-sarif@f94817b9f0deeb3871261446912ae8f854d1b675 # codeql-bundle-v2.25.1
        with:
          sarif_file: sonar.sarif
          category: sonarcloud

      - name: Upload to Codecov
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage-unit.xml,coverage-combined.xml,lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install dependencies
        run: npm install

      - name: Run vitest with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Build
        run: npm run build

      - name: Build docs site
        working-directory: docs-site
        run: npm install && npm run build

      - name: Write JS coverage summary
        if: always()
        run: |
          echo "## Frontend Test Coverage" >> $GITHUB_STEP_SUMMARY
          node - << 'EOF'
          const fs = require('fs');
          const lcov = fs.readFileSync('coverage/lcov.info', 'utf8');
          let totalFound = 0, totalHit = 0;
          const rows = [];
          let curFile = null, curFound = 0, curHit = 0;
          for (const line of lcov.split('\n')) {
            if (line.startsWith('SF:')) {
              curFile = line.slice(3).replace(/^.*\/src\//, 'src/');
              curFound = 0; curHit = 0;
            } else if (line.startsWith('LF:')) {
              curFound = parseInt(line.slice(3), 10);
              totalFound += curFound;
            } else if (line.startsWith('LH:')) {
              curHit = parseInt(line.slice(3), 10);
              totalHit += curHit;
            } else if (line === 'end_of_record' && curFile) {
              const pct = curFound > 0 ? (curHit / curFound * 100).toFixed(0) : 100;
              const bar = pct >= 90 ? '🟢' : pct >= 80 ? '🟡' : '🔴';
              rows.push(`| \`${curFile}\` | ${pct}% | ${bar} |`);
              curFile = null;
            }
          }
          const total = totalFound > 0 ? (totalHit / totalFound * 100).toFixed(1) : 100;
          const summary = [
            `| File | Lines | |`,
            `|:---|---:|:---|`,
            ...rows,
            ``,
            `**Total: ${total}%**`,
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + '\n');
          EOF

      - name: Upload JS coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-js
          path: ui/coverage/lcov.info

  infra-synth:
    name: Infra Synth
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: uv sync --group dev --group infra

      - name: Synth prod stack
        working-directory: infra
        run: cdk synth AgentCoreStarterStack --no-staging -c env=prod -c hosted_zone_id=${{ vars.HOSTED_ZONE_ID }}

      - name: Synth dev stack
        working-directory: infra
        run: cdk synth AgentCoreStarterStack-dev --no-staging -c env=dev -c hosted_zone_id=${{ vars.HOSTED_ZONE_ID }}

      - name: Trivy — IaC scan (table, for log visibility)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra/cdk.out/
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Trivy — IaC scan (CloudFormation templates)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra/cdk.out/
          format: sarif
          output: trivy-iac.sarif
          severity: HIGH,CRITICAL
          # cdk-nag is the hard gate for IaC security (fails synth on violations).
          # Trivy IaC is informational — findings go to the Security tab.
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Upload Trivy IaC results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@f94817b9f0deeb3871261446912ae8f854d1b675 # codeql-bundle-v2.25.1
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  notify-pipeline-failure:
    name: Notify Slack — CI Failure
    needs: [lint-typecheck, audit, unit-tests, integration-tests, coverage, frontend, infra-synth]
    if: >-
      always() &&
      contains(needs.*.result, 'failure') &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: CI pipeline failed on *${{ github.ref_name }}*",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }

# ── Deploy to dev (push to development) ───────────────────────────────────────

  deploy-dev:
    name: Deploy (dev)
    needs: [lint-typecheck, audit, unit-tests, integration-tests, coverage, frontend, infra-synth]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    environment: development
    permissions:
      id-token: write
      contents: read
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    outputs:
      
      api_url: ${{ steps.urls.outputs.api_url }}
      ui_url: ${{ steps.urls.outputs.ui_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: uv sync --group dev --group infra

      - name: Build React UI
        working-directory: ui
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: npm install && npm run build

      - name: Build docs site
        working-directory: docs-site
        run: npm install && npm run build

      - name: Deploy dev stack
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: uv run inv deploy --env dev

      - name: Export stack URLs
        id: urls
        run: |
          STACK=AgentCoreStarterStack-dev
          query() { aws cloudformation describe-stacks --stack-name $STACK --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text; }
          echo "api_url_direct=$(query ApiFunctionUrl)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(query ApiFunctionUrl)"  >> "$GITHUB_OUTPUT"
          echo "ui_url=$(query UiUrl)"            >> "$GITHUB_OUTPUT"

      - name: Notify Slack — deploy success
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: Deploy to *dev* succeeded",
              "attachments": [{
                "color": "good",
                "text": "API: ${{ steps.urls.outputs.api_url }}\nUI: ${{ steps.urls.outputs.ui_url }}"
              }]
            }

      - name: Notify Slack — deploy failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: Deploy to *dev* failed",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }

  e2e-dev:
    name: E2E Tests (dev)
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    environment: development
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      # The six per-suite e2e test files (test_auth_e2e.py, test_mcp_e2e.py,
      # test_admin_e2e.py, test_ui_e2e.py, test_docs_e2e.py,
      # test_dashboard_e2e.py) were removed during the #47-era scaffolding
      # strip-down. Until proper e2e suites are reauthored against the
      # current API/UI surface (tracked separately), this job runs a
      # single smoke check against the deployed dev API — green smoke
      # proves the Lambda is up and the Function URL is reachable from
      # the runner, validating the full deploy → reachability chain.
      # Mirrors the e2e-prod "Smoke test prod API" precedent below.
      - name: Smoke test dev API
        env:
          STARTER_API_URL: ${{ needs.deploy-dev.outputs.api_url }}
        run: |
          # /health must return JSON with .status == 'ok' on a healthy
          # Lambda. AWSLWA returns HTTP 200 even on init failure (the
          # error response body is whatever the runtime emitted — often
          # plaintext like 'Runtime.ImportModuleError: ...', sometimes
          # JSON), so status-only smoke is structurally incapable of
          # catching init failures. Do not unwind this assertion without
          # filing a replacement defense — see #111.
          # -sS surfaces curl-side errors (DNS/TLS/connectivity) instead
          # of silently hiding them; --connect-timeout / --max-time
          # prevent indefinite hangs.
          RESPONSE=$(curl -sS --connect-timeout 5 --max-time 15 -w "\nHTTP_CODE:%{http_code}" "${STARTER_API_URL%/}/health")
          STATUS=$(printf '%s\n' "$RESPONSE" | tail -n 1 | sed 's/^HTTP_CODE://')
          BODY=$(printf '%s\n' "$RESPONSE" | sed '$d')
          echo "Health check status: $STATUS"
          # Print the body inside a workflow-command group, with each line
          # prefixed, so a malicious/malformed body cannot inject Actions
          # workflow commands (lines starting with '::...' are interpreted
          # by the runner otherwise). Use printf to avoid echo's
          # implementation-defined handling of leading '-n'/'-e' tokens.
          echo "::group::Health check body"
          printf '%s\n' "$BODY" | sed 's/^/  /'
          echo "::endgroup::"
          [ "$STATUS" = "200" ] || (echo "Dev health check HTTP status not 200!" && exit 1)
          HEALTH_STATUS=$(printf '%s\n' "$BODY" | jq -r '.status') || (echo "Dev health check body is not valid JSON!" && exit 1)
          [ "$HEALTH_STATUS" = "ok" ] || (echo "Dev health check .status != 'ok' (got: $HEALTH_STATUS)" && exit 1)

      - name: Notify Slack — e2e failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: E2E tests failed on *dev* after deploy",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }

# ── Release + deploy to prod (push to main) ───────────────────────────────────

  release:
    name: Release
    needs: [lint-typecheck, audit, unit-tests, integration-tests, coverage, frontend, infra-synth]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0   # needed for git describe to find the previous tag

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Infer version and create release
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(uv run inv version)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --generate-notes --title "v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  deploy-prod:
    name: Deploy (prod)
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    outputs:
      
      api_url: ${{ steps.urls.outputs.api_url }}
      ui_url: ${{ steps.urls.outputs.ui_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: uv sync --group dev --group infra

      - name: Build React UI
        working-directory: ui
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: npm install && npm run build

      - name: Build docs site
        working-directory: docs-site
        run: npm install && npm run build

      - name: Deploy prod stack
        env:
          APP_VERSION: ${{ needs.release.outputs.version }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: uv run inv deploy --env prod

      - name: Export stack URLs
        id: urls
        run: |
          STACK=AgentCoreStarterStack
          query() { aws cloudformation describe-stacks --stack-name $STACK --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text; }
          echo "api_url_direct=$(query ApiFunctionUrl)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(query ApiFunctionUrl)"  >> "$GITHUB_OUTPUT"
          echo "ui_url=$(query UiUrl)"            >> "$GITHUB_OUTPUT"

      - name: Notify Slack — deploy success
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: Deploy to *prod* succeeded — version `${{ needs.release.outputs.version }}`",
              "attachments": [{
                "color": "good",
                "text": "API: ${{ steps.urls.outputs.api_url }}\nUI: ${{ steps.urls.outputs.ui_url }}"
              }]
            }

      - name: Notify Slack — deploy failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: Deploy to *prod* failed — version `${{ needs.release.outputs.version }}`",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }

  e2e-prod:
    name: E2E Tests (prod)
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      # All e2e tests require STARTER_BYPASS_GOOGLE_AUTH which is dev-only.
      # Run a lightweight smoke test instead — just verify the prod API is up.
      - name: Smoke test prod API
        env:
          STARTER_API_URL: ${{ needs.deploy-prod.outputs.api_url }}
        run: |
          # /health must return JSON with .status == 'ok' on a healthy
          # Lambda. AWSLWA returns HTTP 200 even on init failure (the
          # error response body is whatever the runtime emitted — often
          # plaintext like 'Runtime.ImportModuleError: ...', sometimes
          # JSON), so status-only smoke is structurally incapable of
          # catching init failures. Do not unwind this assertion without
          # filing a replacement defense — see #111.
          # -sS surfaces curl-side errors (DNS/TLS/connectivity) instead
          # of silently hiding them; --connect-timeout / --max-time
          # prevent indefinite hangs.
          RESPONSE=$(curl -sS --connect-timeout 5 --max-time 15 -w "\nHTTP_CODE:%{http_code}" "${STARTER_API_URL%/}/health")
          STATUS=$(printf '%s\n' "$RESPONSE" | tail -n 1 | sed 's/^HTTP_CODE://')
          BODY=$(printf '%s\n' "$RESPONSE" | sed '$d')
          echo "Health check status: $STATUS"
          # Print the body inside a workflow-command group, with each line
          # prefixed, so a malicious/malformed body cannot inject Actions
          # workflow commands (lines starting with '::...' are interpreted
          # by the runner otherwise). Use printf to avoid echo's
          # implementation-defined handling of leading '-n'/'-e' tokens.
          echo "::group::Health check body"
          printf '%s\n' "$BODY" | sed 's/^/  /'
          echo "::endgroup::"
          [ "$STATUS" = "200" ] || (echo "Prod health check HTTP status not 200!" && exit 1)
          HEALTH_STATUS=$(printf '%s\n' "$BODY" | jq -r '.status') || (echo "Prod health check body is not valid JSON!" && exit 1)
          [ "$HEALTH_STATUS" = "ok" ] || (echo "Prod health check .status != 'ok' (got: $HEALTH_STATUS)" && exit 1)

      - name: Notify Slack — e2e failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: E2E tests failed on *prod* after deploy",
              "attachments": [{
                "color": "danger",
                "text": "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }

  back-merge:
    name: Back-merge main → development
    needs: e2e-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Create back-merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run inv back-merge
