<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentCore Starter</title>
    <meta name="description" content="AgentCore Starter — a template for AWS-native AI agent backends." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Analytics 4 — gated on the consent banner. Only loads when
         VITE_GA_MEASUREMENT_ID is set AND the visitor has opted in. -->
    <script>
      (function () {
        var id = "%VITE_GA_MEASUREMENT_ID%";
        if (!id) return;
        try {
          if (localStorage.getItem("starter_ga_consent") !== "accept") return;
        } catch (e) {
          return;
        }
        var s = document.createElement("script");
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + id;
        s.async = true;
        s.dataset.starterGa = "1";
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() { window.dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag("js", new Date());
        gtag("config", id, { send_page_view: false });
      })();
    </script>
    <!-- Set theme before first paint to prevent flash of wrong background colour -->
    <script>
      (function () {
        var stored = localStorage.getItem("starter_theme");
        var theme =
          stored === "dark" || stored === "light"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
